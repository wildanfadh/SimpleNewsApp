version: 2.1

jobs:
  test-and-lint:
    docker:
      - image: cimg/node:16.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "yarn.lock" }}
            - v1-dependencies-
      - run:
          name: Install dependencies
          command: yarn install --frozen-lockfile
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "yarn.lock" }}
      - run:
          name: Run linting
          command: yarn lint
      - run:
          name: Run tests
          command: yarn test
      - run:
          name: Type check
          command: npx tsc --noEmit

workflows:
  test-and-lint-workflow:
    jobs:
      - test-and-lint
